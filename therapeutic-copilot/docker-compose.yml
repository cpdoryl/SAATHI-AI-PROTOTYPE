version: "3.9"

# ─── SAATHI AI — Local Development Docker Compose ─────────────────────────────
# Run: docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://saathi:saathi_dev@db:5432/saathi_copilot
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./server:/app         # hot-reload in dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - saathi-dev

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host
    networks:
      - saathi-dev

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: saathi
      POSTGRES_PASSWORD: saathi_dev
      POSTGRES_DB: saathi_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saathi"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - saathi-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - saathi-dev

volumes:
  postgres_data:

networks:
  saathi-dev:
    driver: bridge
