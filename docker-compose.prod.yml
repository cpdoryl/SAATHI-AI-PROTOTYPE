version: "3.9"

# ─── SAATHI AI — Production Docker Compose ───────────────────────────────────
# Target: E2E Networks Mumbai (Indian data sovereignty)
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./therapeutic-copilot/client/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: always
    networks:
      - saathi-net

  backend:
    build:
      context: ./therapeutic-copilot/server
      dockerfile: Dockerfile.prod
    env_file:
      - ./therapeutic-copilot/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - saathi-net

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - saathi-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - saathi-net

volumes:
  postgres_data:
  redis_data:

networks:
  saathi-net:
    driver: bridge
